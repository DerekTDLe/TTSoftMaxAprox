# Tiny Tapeout project information
project:
  title:        "nonLUT_softmax"      # Project title
  author:       "DerekTDLe"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "4-input LUT-less softmax accelerator using PWL exp and reciprocal approximation"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_nonlut_softmax"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "max4_signed8.v"
    - "norm_sub4.v"
    - "exp_pwl_lane.v"
    - "sum4_tree.v"
    - "recip_nr.v"
    - "scale4_clip.v"
    - "serializer4.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "x_in[0] / serial data bit[0]"
  ui[1]: "x_in[1] / serial data bit[1]"
  ui[2]: "x_in[2] / serial data bit[2]"
  ui[3]: "x_in[3] / serial data bit[3]"
  ui[4]: "x_in[4] / serial data bit[4]"
  ui[5]: "x_in[5] / serial data bit[5]"
  ui[6]: "x_in[6] / serial data bit[6]"
  ui[7]: "start / serial data bit[7]"

  # Outputs
  uo[0]: "softmax_out[0] / serial data bit[0]"
  uo[1]: "softmax_out[1] / serial data bit[1]"
  uo[2]: "softmax_out[2] / serial data bit[2]"
  uo[3]: "softmax_out[3] / serial data bit[3]"
  uo[4]: "softmax_out[4] / serial data bit[4]"
  uo[5]: "softmax_out[5] / serial data bit[5]"
  uo[6]: "softmax_out[6] / serial data bit[6]"
  uo[7]: "softmax_out[7] / serial data bit[7]"

  # Bidirectional pins
  uio[0]: "done flag"
  uio[1]: "serializer valid"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
